<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Sin Conexion — Modas Nancy</title>
    <meta name="theme-color" content="#e85c8a">
    <link rel="stylesheet" href="/css/theme-tokens.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-body);
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .offline-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 3rem 2rem;
            max-width: 360px;
            width: 100%;
            box-shadow: var(--shadow-card);
        }
        .offline-icon {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        .offline-title {
            font-family: var(--font-headings);
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }
        .offline-desc {
            font-size: var(--fs-body);
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.9rem 1.8rem;
            border-radius: var(--border-radius-btn);
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: var(--fs-body);
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            min-height: 44px;
        }
        .btn:hover { opacity: 0.9; }
        .offline-logo {
            font-family: var(--font-logo);
            font-size: var(--fs-logo);
            letter-spacing: var(--ls-logo);
            color: var(--text-main);
            margin-bottom: 2rem;
        }
        .offline-logo span { color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-logo">MODAS<span>NANCY</span></div>
        <div class="offline-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"></path>
            </svg>
        </div>
        <h1 class="offline-title">Sin conexion a internet</h1>
        <p class="offline-desc">Parece que no tienes conexion. Algunas funciones estan disponibles offline, pero necesitas internet para comprar o ver el catalogo actualizado.</p>
        <button class="btn" onclick="window.location.reload()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Reintentar
        </button>
    </div>
</body>
</html>
