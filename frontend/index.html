    <!-- TOP MARQUEE BAR -->
    <div class="top-marquee-bar" id="top-marquee">
        <div class="marquee-track-js" id="marquee-track"></div>
    </div>
    <script>
    (function(){
        const msgs = [
            "Atención rápida y personalizada",
            "Compra fácil y segura",
            "Productos 100% garantizados",
            "Calidad que sí cumple",
            "Pagos contra entrega disponibles",
            "Aceptamos transferencia y tarjeta",
            "Ofertas nuevas cada semana",
            "Envíos rápidos en toda Guatemala",
            "Compra desde cualquier lugar",
            "Soporte antes y después de tu compra",
            "Miles de clientes satisfechos",
            "Promociones exclusivas por tiempo limitado",
            "Tu pedido seguro y protegido",
            "Cotizaciones sin compromiso",
            "Garantía en productos seleccionados",
            "Compra hoy, recibe rápido",
            "Todo lo que necesitas en un solo lugar",
            "Estrena sin pagar de más",
            "Novedades y lanzamientos cada semana",
            "Servicio confiable y transparente",
            "Precios especiales por pago en efectivo",
            "Próximamente disponible en Android y iPhone",
            "La mejor experiencia de compra online",
            "Envíos a agencia o domicilio",
            "Empaque seguro para todos los pedidos",
            "Calidad, precio y confianza"
        ];
        const track = document.getElementById('marquee-track');
        if (!track) return;
        const html = msgs.map(function(m){ return '<span class="mq-item">' + m + '</span><span class="mq-dot">◆</span>'; }).join('');
        track.innerHTML = html + html;
        let pos = 0;
        let paused = false;
        const bar = document.getElementById('top-marquee');
        if (bar) {
            bar.addEventListener('mouseenter', function(){ paused = true; });
            bar.addEventListener('mouseleave', function(){ paused = false; });
        }
        function animate() {
            if (!paused) {
                pos -= 0.35;
                var half = track.scrollWidth / 2;
                if (half > 0 && Math.abs(pos) >= half) {
                    pos = 0;
                }
                track.style.transform = 'translateX(' + pos + 'px)';
            }
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    })();
    </script>
