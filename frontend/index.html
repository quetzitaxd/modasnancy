<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Modas Nancy">
    <meta name="description" content="Boutique de moda femenina. Los mejores precios en Guatemala.">
    <title>modasnancy</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/brand/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/brand/logo.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme-tokens.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/home.css">
    <style>
        /* Sidebar de categorias */
        .cat-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            max-width: 85vw;
            background: white;
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s ease-out;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .cat-sidebar.open {
            transform: translateX(0);
        }
        .cat-sidebar__header {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafafa;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .cat-sidebar__title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cat-sidebar__close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: #666;
        }
        .cat-sidebar__close:hover { background: #e0e0e0; }
        .cat-sidebar__list {
            padding: 0.5rem 0;
            flex: 1;
        }
        .cat-sidebar__item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.9rem 1rem;
            cursor: pointer;
            transition: background 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            font-size: 0.9rem;
            color: #333;
        }
        .cat-sidebar__item:hover { background: #f8f8f8; }
        .cat-sidebar__item.active { background: #fff2f0; color: var(--primary-color); font-weight: 600; }
        .cat-sidebar__item svg { flex-shrink: 0; color: #999; }
        .cat-sidebar__item.active svg { color: var(--primary-color); }
        .cat-sidebar__overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-out;
        }
        .cat-sidebar__overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .cat-sidebar__badge {
            margin-left: auto;
            background: #f0f0f0;
            color: #666;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        /* Filtro activo badge */
        .active-filter-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            background: white;
            margin: 0.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
        }
        .active-filter-bar strong {
            color: #333;
        }
        .active-filter-bar button {
            margin-left: auto;
            background: none;
            border: none;
            color: #d63031;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body style="background:#f5f5f5;">

    <!-- SIDEBAR CATEGORIAS -->
    <div class="cat-sidebar__overlay" id="cat-overlay" onclick="closeCategorySidebar()"></div>
    <aside class="cat-sidebar" id="cat-sidebar">
        <div class="cat-sidebar__header">
            <div class="cat-sidebar__title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Categorias
            </div>
            <button class="cat-sidebar__close" onclick="closeCategorySidebar()" aria-label="Cerrar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="cat-sidebar__list" id="cat-sidebar-list">
            <button class="cat-sidebar__item active" data-filter="all" onclick="applyCategoryFilter('all', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Todos los productos
            </button>
            <button class="cat-sidebar__item" data-filter="sale" onclick="applyCategoryFilter('sale', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                Ofertas
                <span class="cat-sidebar__badge">Promo</span>
            </button>
            <button class="cat-sidebar__item" data-filter="new" onclick="applyCategoryFilter('new', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                Nuevos
            </button>
            <div style="border-top:1px solid #f0f0f0; margin: 0.5rem 0;"></div>
            <button class="cat-sidebar__item" data-filter="vestidos" onclick="applyCategoryFilter('vestidos', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
                Vestidos
            </button>
            <button class="cat-sidebar__item" data-filter="blusas" onclick="applyCategoryFilter('blusas', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
                Blusas
            </button>
            <button class="cat-sidebar__item" data-filter="faldas" onclick="applyCategoryFilter('faldas', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
                Faldas
            </button>
            <button class="cat-sidebar__item" data-filter="pantalones" onclick="applyCategoryFilter('pantalones', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
                Pants
            </button>
            <button class="cat-sidebar__item" data-filter="accesorios" onclick="applyCategoryFilter('accesorios', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                Accesorios
            </button>
        </div>
    </aside>

    <!-- SEARCH BAR -->
    <section class="search-section">
        <div class="search-bar">
            <div class="search-input-wrap">
                <input type="text" placeholder="Buscar productos..." id="search-input" autocomplete="off">
                <div class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
            </div>
            <button class="search-camera" aria-label="Buscar por foto">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
        </div>
    </section>

    <!-- TRUST BANNER -->
    <div class="trust-banner">
        <div class="trust-item-inline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Envio gratis
        </div>
        <div style="width:1px; height:14px; background:#d9f7be; flex-shrink:0;"></div>
        <div class="trust-item-inline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Reembolso por 30 dias
        </div>
        <svg class="trust-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <main id="main-content">
        <!-- ACTIVE FILTER BAR -->
        <div class="active-filter-bar" id="active-filter-bar" style="display:none;">
            Mostrando: <strong id="active-filter-name">Todos</strong>
            <button onclick="clearCategoryFilter()">Limpiar</button>
        </div>

        <!-- PRODUCT GRID -->
        <section aria-label="Productos">
            <div id="loading" class="loader" style="padding:2rem; background:white; margin:0.5rem; border-radius:8px;">
                <div class="loader__spinner"></div>
            </div>
            <div id="products-grid" class="products-temu"></div>
        </section>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav-temu" aria-label="Navegacion">
        <a href="/" class="bottom-nav-temu__item active" aria-label="Inicio">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Inicio</span>
        </a>
        <button type="button" class="bottom-nav-temu__item" aria-label="Categorias" onclick="openCategorySidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span>Categorias</span>
        </button>
        <a href="/instalar.html" class="bottom-nav-temu__item" aria-label="Instalar app">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Instalar</span>
        </a>
        <a href="/carrito.html" class="bottom-nav-temu__item" aria-label="Carrito" style="position:relative;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span>Carrito</span>
            <span class="bottom-nav-temu__badge" data-cart-count style="display:none;">0</span>
            <span class="bottom-nav-temu__tag">Envio gratis</span>
        </a>
    </nav>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts -->
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/home.js?v=20260522"></script>
</body>
</html>
