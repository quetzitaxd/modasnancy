<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Modas Nancy">
    <meta name="description" content="Tu carrito de compras en Modas Nancy.">
    <title>Carrito — Modas Nancy</title>
    <link rel="icon" href="/assets/brand/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/brand/logo.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme-tokens.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/home.css">
    <style>
        .cart-page { background: #f5f5f5; min-height: 100vh; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

        /* Top bar */
        .cart-topbar {
            position: sticky;
            top: 0;
            z-index: 900;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            height: 48px;
        }
        .cart-topbar__title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
        }
        .cart-topbar__clear {
            font-size: 0.75rem;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
        }
        .cart-topbar__clear:active { color: #d63031; }

        /* Empty state */
        .cart-empty {
            text-align: center;
            padding: 4rem 1.5rem;
        }
        .cart-empty svg {
            width: 80px; height: 80px;
            color: #ddd;
            margin-bottom: 1rem;
        }
        .cart-empty h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .cart-empty p {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 1.5rem;
        }

        /* Cart items */
        .cart-items { padding: 0.5rem; }
        .cart-item {
            display: flex;
            gap: 0.75rem;
            background: white;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            position: relative;
        }
        .cart-item__img {
            width: 90px; height: 90px;
            border-radius: 8px;
            overflow: hidden;
            background: #f8f8f8;
            flex-shrink: 0;
        }
        .cart-item__img img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .cart-item__info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cart-item__name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #333;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0.25rem;
        }
        .cart-item__variant {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 0.25rem;
        }
        .cart-item__price {
            font-size: 0.85rem;
            font-weight: 700;
            color: #000;
        }
        .cart-item__price-old {
            font-size: 0.7rem;
            color: #999;
            text-decoration: line-through;
            margin-left: 0.3rem;
        }
        .cart-item__actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.25rem;
        }
        .cart-item__qty {
            display: flex;
            align-items: center;
            gap: 0;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            overflow: hidden;
        }
        .cart-item__qty button {
            width: 28px; height: 28px;
            border: none;
            background: white;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .cart-item__qty button:active { background: #f5f5f5; }
        .cart-item__qty span {
            min-width: 28px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #333;
        }
        .cart-item__remove {
            width: 32px; height: 32px;
            border: none;
            background: none;
            color: #999;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item__remove:active { color: #d63031; }

        /* Free shipping progress */
        .cart-shipping {
            background: white;
            margin: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
        .cart-shipping__text {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 0.4rem;
        }
        .cart-shipping__text strong { color: #52c41a; }
        .cart-shipping__bar {
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }
        .cart-shipping__bar-fill {
            height: 100%;
            background: #52c41a;
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Recommended */
        .cart-recommended {
            padding: 1rem 0.5rem;
        }
        .cart-recommended h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.6rem;
            padding-left: 0.25rem;
        }

        /* Bottom action */
        .cart-bottom {
            position: fixed;
            bottom: calc(56px + env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            z-index: 920;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .cart-bottom__total {
            display: flex;
            flex-direction: column;
        }
        .cart-bottom__label {
            font-size: 0.65rem;
            color: #999;
        }
        .cart-bottom__amount {
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
        }
        .cart-bottom__btn {
            flex: 1;
            max-width: 200px;
            height: 44px;
            border-radius: 22px;
            border: none;
            background: #000;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .cart-bottom__btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (min-width: 768px) {
            .cart-items { max-width: 700px; margin: 0 auto; }
            .cart-bottom { justify-content: center; gap: 2rem; }
        }
    </style>
</head>
<body style="background:#f5f5f5;">

    <div class="cart-page">
        <!-- TOP BAR -->
        <div class="cart-topbar">
            <span class="cart-topbar__title" id="cart-title">Carrito (0)</span>
            <button class="cart-topbar__clear" id="btn-clear" style="display:none;" onclick="clearCartPage()">Vaciar</button>
        </div>

        <!-- EMPTY -->
        <div id="cart-empty" class="cart-empty" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <h2>Tu carrito esta vacio</h2>
            <p>Agrega productos para comenzar tu compra</p>
            <a href="/" class="btn btn--primary">Ver productos</a>
        </div>

        <!-- ITEMS -->
        <div id="cart-items" class="cart-items"></div>

        <!-- FREE SHIPPING -->
        <div id="cart-shipping" class="cart-shipping" style="display:none;"></div>

        <!-- RECOMMENDED -->
        <div class="cart-recommended" id="cart-recommended" style="display:none;">
            <h3>Tambien te puede gustar</h3>
            <div id="recommended-grid" class="products-temu"></div>
        </div>
    </div>

    <!-- BOTTOM ACTION -->
    <div class="cart-bottom" id="cart-bottom" style="display:none;">
        <div class="cart-bottom__total">
            <span class="cart-bottom__label">Total sin envio</span>
            <span class="cart-bottom__amount" id="cart-total">Q0.00</span>
        </div>
        <button class="cart-bottom__btn" id="btn-checkout" onclick="goToCheckout()">
            Proceder al pago
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav-temu" aria-label="Navegacion">
        <a href="/" class="bottom-nav-temu__item" aria-label="Inicio">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Inicio</span>
        </a>
        <button type="button" class="bottom-nav-temu__item" aria-label="Menu" onclick="if(window.openMenuSidebar)window.openMenuSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span>Menu</span>
        </button>
        <a href="/live.html" class="bottom-nav-temu__item" aria-label="Live Shopping">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            <span>Live</span>
        </a>
        <a href="/carrito.html" class="bottom-nav-temu__item active" aria-label="Carrito" style="position:relative;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span>Carrito</span>
            <span class="bottom-nav-temu__badge" data-cart-count style="display:none;">0</span>
            <span class="bottom-nav-temu__tag">Envio gratis</span>
        </a>
    </nav>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/ui.js"></script>
    <script>
        let freshProducts = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                freshProducts = await getProducts();
            } catch (e) {
                console.warn('No se pudieron cargar productos frescos');
            }
            renderCartPage();
            window.addEventListener('cart:updated', () => renderCartPage());
        });

        function renderCartPage() {
            const cart = getCart();
            const container = document.getElementById('cart-items');
            const emptyEl = document.getElementById('cart-empty');
            const bottomEl = document.getElementById('cart-bottom');
            const shippingEl = document.getElementById('cart-shipping');
            const titleEl = document.getElementById('cart-title');
            const clearBtn = document.getElementById('btn-clear');
            const totalEl = document.getElementById('cart-total');
            const recEl = document.getElementById('cart-recommended');

            titleEl.textContent = `Carrito (${cart.reduce((s, i) => s + (i.quantity || 0), 0)})`;

            if (cart.length === 0) {
                container.innerHTML = '';
                emptyEl.style.display = 'block';
                bottomEl.style.display = 'none';
                shippingEl.style.display = 'none';
                clearBtn.style.display = 'none';
                recEl.style.display = 'block';
                renderRecommended();
                return;
            }

            emptyEl.style.display = 'none';
            bottomEl.style.display = 'flex';
            shippingEl.style.display = 'block';
            clearBtn.style.display = 'block';
            recEl.style.display = 'none';

            // Render items
            container.innerHTML = '';
            cart.forEach((item, index) => {
                const fresh = Array.isArray(freshProducts) ? freshProducts.find((p) => p.id === item.product_id) : null;
                const price = Number(fresh ? fresh.price : item.price) || 0;
                const originalPrice = Number(fresh ? fresh.original_price : item.original_price) || 0;
                const isSale = fresh ? fresh.sale_enabled : item.sale_enabled;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item__img">
                        <img src="${safeImageUrl(item.image, '/assets/placeholder.svg')}" alt="${safeText(item.name)}" loading="lazy" onerror="this.src='/assets/placeholder.svg'">
                    </div>
                    <div class="cart-item__info">
                        <div>
                            <div class="cart-item__name">${safeText(item.name)}</div>
                            <div class="cart-item__variant">${item.color_name ? item.color_name + ' / ' : ''}${item.size ? item.size.toUpperCase() : 'Unica'}</div>
                            <div class="cart-item__price">
                                ${formatMoney(price)}
                                ${isSale && originalPrice > price ? `<span class="cart-item__price-old">${formatMoney(originalPrice)}</span>` : ''}
                            </div>
                        </div>
                        <div class="cart-item__actions">
                            <div class="cart-item__qty">
                                <button type="button" onclick="changeQty(${index}, -1)" aria-label="Restar">-</button>
                                <span>${item.quantity || 1}</span>
                                <button type="button" onclick="changeQty(${index}, 1)" aria-label="Sumar">+</button>
                            </div>
                            <button class="cart-item__remove" type="button" onclick="removeCartItem(${index})" aria-label="Eliminar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            // Totals
            const subtotal = calculateCartTotal(freshProducts);
            totalEl.textContent = formatMoney(subtotal);

            // Shipping progress
            const threshold = SHIPPING_CONFIG.CAPITAL_FREE_THRESHOLD;
            const progress = Math.min((subtotal / threshold) * 100, 100);
            const remaining = Math.max(threshold - subtotal, 0);
            shippingEl.innerHTML = `
                <div class="cart-shipping__text">
                    ${remaining > 0
                        ? `Te faltan <strong>${formatMoney(remaining)}</strong> para envio gratis en capital`
                        : '<strong>Envio gratis!</strong> Tu compra califica para envio gratis en capital'}
                </div>
                <div class="cart-shipping__bar">
                    <div class="cart-shipping__bar-fill" style="width:${progress}%"></div>
                </div>
            `;
        }

        function changeQty(index, delta) {
            updateCartQty(index, delta);
            renderCartPage();
        }

        function removeCartItem(index) {
            removeFromCart(index);
            showToast('Producto eliminado del carrito');
            renderCartPage();
        }

        function clearCartPage() {
            if (!confirm('Vaciar carrito?')) return;
            clearCart();
            showToast('Carrito vaciado');
            renderCartPage();
        }

        function goToCheckout() {
            window.location.href = '/checkout.html';
        }

        async function renderRecommended() {
            const container = document.getElementById('recommended-grid');
            if (!container) return;
            try {
                const products = await getProducts();
                const active = (Array.isArray(products) ? products : [])
                    .filter((p) => p.is_active)
                    .slice(0, 4);
                container.innerHTML = '';
                active.forEach((product, index) => {
                    container.appendChild(renderTemuCard(product, index));
                });
            } catch (e) {
                container.innerHTML = '<p style="color:#999; font-size:0.8rem; text-align:center;">Descubre mas en nuestro catalogo</p>';
            }
        }

        function renderTemuCard(product, index) {
            const card = document.createElement('div');
            card.className = 'product-temu';
            const firstImage = product?.images?.[0];
            const totalStock = Number(product?.total_stock) || 0;
            const isOutOfStock = totalStock === 0;
            const rating = Math.floor(Math.random() * 2) + 4;
            const sold = ['200+','500+','1K+','2K+','4.8K+','10K+'][Math.floor(Math.random() * 6)];
            const isAd = index < 2;

            let badgeHtml = '';
            if (product?.sale_enabled) badgeHtml = `<div class="product-temu__badge-img product-temu__badge-img--sale">OFERTA</div>`;
            else if (product?.bundle_2x_enabled) badgeHtml = `<div class="product-temu__badge-img product-temu__badge-img--flash">2x1</div>`;

            let priceHtml = '';
            let discountHtml = '';
            if (product?.sale_enabled && product?.original_price > 0) {
                const discount = Math.round(((product.original_price - product.price) / product.original_price) * 100);
                priceHtml = `<span class="product-temu__price">${formatMoney(product.price)}</span><span class="product-temu__price-old">${formatMoney(product.original_price)}</span>`;
                discountHtml = `<span class="product-temu__price-discount">-${discount}%</span>`;
            } else if (product?.bundle_2x_enabled && product?.bundle_2x_price > 0) {
                priceHtml = `<span class="product-temu__price">2x ${formatMoney(product.bundle_2x_price)}</span>`;
            } else {
                priceHtml = `<span class="product-temu__price">${formatMoney(product.price)}</span>`;
            }

            const urgencyHtml = product?.sale_enabled ? `<div class="product-temu__urgency"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Ultimo dia</div>` : '';

            card.innerHTML = `
                <div class="product-temu__img-wrap">
                    ${badgeHtml}
                    <img src="${safeImageUrl(firstImage, '/assets/placeholder.svg')}" alt="${safeText(product.name)}" loading="lazy" onerror="this.src='/assets/placeholder.svg'">
                    ${isAd ? '<span class="product-temu__ad-label">Anuncio</span>' : ''}
                </div>
                <div class="product-temu__info">
                    <div class="product-temu__title">${safeText(product.name)}</div>
                    <div class="product-temu__rating">
                        <div class="product-temu__stars">${renderStars(rating)}</div>
                        <div class="product-temu__sold">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fa8c16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                            ${sold} vendidos
                        </div>
                    </div>
                    <div class="product-temu__price-row">${priceHtml}${discountHtml}</div>
                    ${urgencyHtml}
                    <div class="product-temu__actions">
                        <span style="font-size:0.6rem; color:#999;">${isOutOfStock ? 'Agotado' : 'En stock'}</span>
                        <button class="product-temu__cart-btn" type="button" aria-label="Agregar al carrito" ${isOutOfStock ? 'disabled style="opacity:0.4;"' : ''} onclick="event.stopPropagation(); addTemuToCart('${encodeURIComponent(product.id)}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </button>
                    </div>
                </div>
            `;

            card.addEventListener('click', (e) => {
                if (e.target.closest('.product-temu__cart-btn')) return;
                window.location.href = `/producto.html?id=${encodeURIComponent(product.id)}`;
            });
            return card;
        }

        function renderStars(count) {
            let html = '';
            for (let i = 0; i < 5; i++) {
                const fill = i < count ? '#fa8c16' : '#e8e8e8';
                html += `<svg viewBox="0 0 24 24" fill="${fill}" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
            }
            return html;
        }

        async function addTemuToCart(encodedId) {
            const id = decodeURIComponent(encodedId);
            try {
                const product = await getProduct(id);
                if (!product) { showToast('Producto no encontrado', 'error'); return; }
                const totalStock = Number(product.total_stock) || 0;
                if (totalStock === 0) { showToast('Producto agotado', 'error'); return; }
                const firstImage = product.images?.[0] || '';
                const variant = product.variants?.[0];
                window.Cart.add({
                    product_id: product.id,
                    sku: variant?.sku || product.id,
                    size: variant?.size || 'Unica',
                    color_name: variant?.color_name || '',
                    image: firstImage,
                    quantity: 1,
                });
            } catch (err) {
                showToast('Error al agregar al carrito', 'error');
            }
        }
    </script>
    <script src="/js/menu-drawer.js?v=1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Cart.init().catch(console.error);
        });
    </script>
</body>
</html>
