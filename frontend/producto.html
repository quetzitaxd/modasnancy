<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="icon" href="/assets/brand/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/brand/logo.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* Product detail Temu-style */
        .product-page { background: #f5f5f5; min-height: 100vh; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

        /* Top bar */
        .product-topbar {
            position: sticky;
            top: 0;
            z-index: 900;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            height: 48px;
        }
        .product-topbar__btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            display: flex; align-items: center; justify-content: center;
            color: #333;
            cursor: pointer;
        }
        .product-topbar__title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
            text-align: center;
        }

        /* Image gallery */
        .product-gallery {
            position: relative;
            background: white;
        }
        .product-gallery__main {
            aspect-ratio: 1;
            overflow: hidden;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-gallery__main img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .product-gallery__dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 0.75rem 0;
        }
        .product-gallery__dot {
            width: 6px; height: 6px;
            border-radius: 3px;
            background: #ddd;
            transition: all 0.2s;
        }
        .product-gallery__dot.active {
            background: #333;
            width: 16px;
        }
        .product-gallery__badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 2;
        }
        .product-gallery__badge--sale {
            background: linear-gradient(90deg, #ff4d4f, #ff7875);
            color: white;
        }
        .product-gallery__badge--bundle {
            background: linear-gradient(90deg, #fa8c16, #ffc53d);
            color: white;
        }
        .product-gallery__count {
            position: absolute;
            bottom: 40px;
            right: 10px;
            background: rgba(0,0,0,0.55);
            color: white;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        /* Info block */
        .product-info {
            background: white;
            padding: 0.75rem 1rem 1rem;
            margin-bottom: 0.5rem;
        }
        .product-info__price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
            flex-wrap: wrap;
        }
        .product-info__price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000;
        }
        .product-info__price-old {
            font-size: 0.85rem;
            color: #999;
            text-decoration: line-through;
        }
        .product-info__discount {
            font-size: 0.75rem;
            color: #ff4d4f;
            font-weight: 600;
        }
        .product-info__name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
            line-height: 1.4;
            margin-bottom: 0.4rem;
        }
        .product-info__rating {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }
        .product-info__stars { display: flex; gap: 1px; }
        .product-info__stars svg { width: 12px; height: 12px; }
        .product-info__sold {
            font-size: 0.65rem;
            color: #999;
        }
        .product-info__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .product-info__tag {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: #f5f5f5;
            color: #666;
            font-weight: 500;
        }
        .product-info__tag--green { background: #f6ffed; color: #52c41a; }
        .product-info__tag--red { background: #fff2f0; color: #ff4d4f; }

        /* Variant selectors */
        .product-section {
            background: white;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
        }
        .product-section__title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.6rem;
        }
        .variant-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .variant-chip {
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            border: 1.5px solid #e8e8e8;
            background: white;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 36px;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .variant-chip.active {
            border-color: #000;
            background: #000;
            color: white;
        }
        .variant-chip:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .color-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
            display: inline-block;
        }

        /* Description */
        .product-desc {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.5;
        }
        .product-desc p { margin: 0 0 0.5rem; }

        /* Reviews (simulated) */
        .review-summary {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .review-score {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .review-count { font-size: 0.75rem; color: #999; }
        .review-item {
            border-top: 1px solid #f0f0f0;
            padding: 0.6rem 0;
        }
        .review-item__header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.25rem;
        }
        .review-item__avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem;
            color: #666;
            font-weight: 600;
        }
        .review-item__name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #333;
        }
        .review-item__stars { display: flex; gap: 1px; }
        .review-item__stars svg { width: 10px; height: 10px; }
        .review-item__text {
            font-size: 0.75rem;
            color: #666;
            line-height: 1.4;
        }

        /* Recommended products */
        .product-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.6rem;
        }

        /* Sticky bottom action */
        .product-bottom-action {
            position: fixed;
            bottom: calc(56px + env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            z-index: 920;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .product-bottom-action .btn-wish {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1.5px solid #e8e8e8;
            background: white;
            display: flex; align-items: center; justify-content: center;
            color: #333;
            flex-shrink: 0;
        }
        .product-bottom-action .btn-cart {
            flex: 1;
            height: 44px;
            border-radius: 22px;
            border: none;
            background: #000;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
        }
        .product-bottom-action .btn-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (min-width: 768px) {
            .product-gallery__main { aspect-ratio: 4 / 3; max-height: 500px; }
            .product-info { padding: 1rem 1.5rem 1.25rem; }
            .product-section { padding: 1rem 1.5rem; }
        }
    </style>
</head>

    <script>
        // Populate shipping info from config
        (function() {
            const capitalEl = document.getElementById('ship-capital-text');
            const deptEl = document.getElementById('ship-dept-text');
            if (capitalEl && typeof SHIPPING_CONFIG !== 'undefined') {
                capitalEl.textContent = `${formatMoney(SHIPPING_CONFIG.CAPITAL_COST)} (Gratis en compras +${formatMoney(SHIPPING_CONFIG.CAPITAL_FREE_THRESHOLD)})`;
            }
            if (deptEl && typeof SHIPPING_CONFIG !== 'undefined') {
                deptEl.textContent = `${formatMoney(SHIPPING_CONFIG.DEPARTMENT_COST)} tarifa fija`;
            }
        })();

        let currentProduct = null;
        let selectedVariant = null;
        let selectedColor = null;
        let selectedSize = null;
        let allProducts = [];

        const PRODUCT_FALLBACK = '/assets/placeholder.svg';

        function getStarRating() {
            return Math.floor(Math.random() * 2) + 4;
        }
        function getSoldCount() {
            const counts = ['200+', '500+', '1K+', '2K+', '4.8K+', '10K+'];
            return counts[Math.floor(Math.random() * counts.length)];
        }
        function renderStars(count) {
            let html = '';
            for (let i = 0; i < 5; i++) {
                const fill = i < count ? '#fa8c16' : '#e8e8e8';
                html += `<svg viewBox="0 0 24 24" fill="${fill}" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
            }
            return html;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                showProductError('Producto no encontrado.');
                return;
            }

            try {
                const [product, products] = await Promise.all([
                    getProduct(productId),
                    getProducts()
                ]);
                currentProduct = product;
                allProducts = Array.isArray(products) ? products : [];
                renderProduct(currentProduct);
                renderRecommended(currentProduct);
            } catch (err) {
                showProductError(err.message || 'No se pudo cargar el producto.');
            }
        });

        function showProductError(msg) {
            document.getElementById('product-loading').style.display = 'none';
            const errEl = document.getElementById('product-error');
            errEl.style.display = 'block';
            errEl.innerHTML = `<div style="color:#999; font-size:var(--fs-body);"><p>${safeText(msg)}</p><a href="/" class="btn btn--primary" style="margin-top:1rem;">Ver Catalogo</a></div>`;
        }

        function renderProduct(product) {
            document.getElementById('product-loading').style.display = 'none';
            document.getElementById('product-content').style.display = 'block';
            document.getElementById('bottom-action').style.display = 'flex';

            document.getElementById('topbar-title').textContent = safeText(product.name);
            document.getElementById('product-name').textContent = safeText(product.name);
            document.getElementById('product-desc').textContent = safeText(product.description) || 'Prenda exclusiva de nuestra coleccion.';

            // Price
            const priceRow = document.getElementById('price-row');
            let priceHtml = `<span class="product-info__price">${formatMoney(product.price)}</span>`;
            if (product.sale_enabled && product.original_price > 0) {
                const discount = Math.round(((product.original_price - product.price) / product.original_price) * 100);
                priceHtml += `<span class="product-info__price-old">${formatMoney(product.original_price)}</span>`;
                priceHtml += `<span class="product-info__discount">-${discount}%</span>`;
            } else if (product.bundle_2x_enabled && product.bundle_2x_price > 0) {
                priceHtml += `<span class="product-info__discount">2x ${formatMoney(product.bundle_2x_price)}</span>`;
            }
            priceRow.innerHTML = priceHtml;

            // Stars & sold
            const rating = getStarRating();
            document.getElementById('product-stars').innerHTML = renderStars(rating);
            document.getElementById('product-sold').textContent = `${getSoldCount()} vendidos`;

            // Tags
            const tagsEl = document.getElementById('product-tags');
            let tagsHtml = '';
            const totalStock = Number(product.total_stock) || 0;
            if (totalStock === 0) tagsHtml += '<span class="product-info__tag product-info__tag--red">Agotado</span>';
            else if (totalStock <= 3) tagsHtml += `<span class="product-info__tag product-info__tag--red">Ultimos ${totalStock}</span>`;
            else tagsHtml += '<span class="product-info__tag product-info__tag--green">En stock</span>';
            if (product.sale_enabled) tagsHtml += '<span class="product-info__tag">En oferta</span>';
            if (product.bundle_2x_enabled) tagsHtml += '<span class="product-info__tag">2x especial</span>';
            tagsEl.innerHTML = tagsHtml;

            // Badges on image
            const badgesImg = document.getElementById('product-badges-img');
            if (product.sale_enabled) {
                badgesImg.innerHTML = '<span class="product-gallery__badge product-gallery__badge--sale">OFERTA</span>';
            } else if (product.bundle_2x_enabled) {
                badgesImg.innerHTML = '<span class="product-gallery__badge product-gallery__badge--bundle">2x1</span>';
            }

            // Images
            const images = Array.isArray(product.images) && product.images.length > 0
                ? product.images
                : [PRODUCT_FALLBACK];

            const mainImg = document.getElementById('main-image');
            mainImg.src = safeImageUrl(images[0], PRODUCT_FALLBACK);
            mainImg.alt = safeText(product.name);

            const dotsEl = document.getElementById('gallery-dots');
            dotsEl.innerHTML = '';
            if (images.length > 1) {
                images.forEach((src, idx) => {
                    const dot = document.createElement('button');
                    dot.className = 'product-gallery__dot' + (idx === 0 ? ' active' : '');
                    dot.type = 'button';
                    dot.setAttribute('aria-label', `Imagen ${idx + 1}`);
                    dot.addEventListener('click', () => {
                        mainImg.src = safeImageUrl(src, PRODUCT_FALLBACK);
                        dotsEl.querySelectorAll('.product-gallery__dot').forEach((d) => d.classList.remove('active'));
                        dot.classList.add('active');
                    });
                    dotsEl.appendChild(dot);
                });
                document.getElementById('gallery-count').style.display = 'block';
                document.getElementById('gallery-count').textContent = `1 / ${images.length}`;
            }

            // Variants
            const variants = Array.isArray(product.variants) ? product.variants : [];
            const colors = [...new Set(variants.map((v) => v.color_name).filter(Boolean))];
            const sizes = [...new Set(variants.map((v) => v.size).filter(Boolean))];

            if (colors.length > 0) {
                const colorsSection = document.getElementById('colors-section');
                const colorsEl = document.getElementById('color-options');
                colorsSection.style.display = 'block';
                colorsEl.innerHTML = '';
                colors.forEach((color) => {
                    const variant = variants.find((v) => v.color_name === color);
                    const chip = document.createElement('button');
                    chip.className = 'variant-chip';
                    chip.type = 'button';
                    chip.innerHTML = `${variant?.color_hex ? `<span class="color-dot" style="background:${variant.color_hex}"></span>` : ''} ${color}`;
                    chip.addEventListener('click', () => {
                        selectedColor = color;
                        colorsEl.querySelectorAll('.variant-chip').forEach((c) => c.classList.remove('active'));
                        chip.classList.add('active');
                        updateSelectedVariant(variants);
                    });
                    colorsEl.appendChild(chip);
                });
            }

            if (sizes.length > 0) {
                const sizesSection = document.getElementById('sizes-section');
                const sizesEl = document.getElementById('size-options');
                sizesSection.style.display = 'block';
                sizesEl.innerHTML = '';
                sizes.forEach((size) => {
                    const chip = document.createElement('button');
                    chip.className = 'variant-chip';
                    chip.type = 'button';
                    chip.textContent = size.toUpperCase();
                    chip.addEventListener('click', () => {
                        selectedSize = size;
                        sizesEl.querySelectorAll('.variant-chip').forEach((c) => c.classList.remove('active'));
                        chip.classList.add('active');
                        updateSelectedVariant(variants);
                    });
                    sizesEl.appendChild(chip);
                });
            }

            // Cart button
            const btn = document.getElementById('btn-add-cart');
            if (totalStock === 0) {
                btn.disabled = true;
                btn.textContent = 'Agotado';
            } else {
                btn.addEventListener('click', () => handleAddToCart(product, variants, colors, sizes, images));
            }

            // Reviews
            renderReviews();
        }

        function updateSelectedVariant(variants) {
            if (!selectedColor && !selectedSize) return;
            selectedVariant = variants.find((v) => {
                const matchColor = !selectedColor || v.color_name === selectedColor;
                const matchSize = !selectedSize || v.size === selectedSize;
                return matchColor && matchSize;
            });
        }

        function handleAddToCart(product, variants, colors, sizes, images) {
            if (!selectedVariant && variants.length > 0) {
                if (colors.length === 1 && !selectedColor) {
                    selectedColor = colors[0];
                    document.querySelectorAll('#color-options .variant-chip').forEach((c, i) => {
                        if (i === 0) c.classList.add('active');
                    });
                }
                if (sizes.length === 1 && !selectedSize) {
                    selectedSize = sizes[0];
                    document.querySelectorAll('#size-options .variant-chip').forEach((c, i) => {
                        if (i === 0) c.classList.add('active');
                    });
                }
                updateSelectedVariant(variants);
            }

            if (variants.length > 0 && !selectedVariant) {
                showToast('Selecciona talla y color antes de agregar.', 'error');
                return;
            }

            addToCart({
                product_id: product.id,
                sku: selectedVariant ? selectedVariant.sku : product.id,
                name: product.name,
                price: product.price,
                size: selectedVariant ? selectedVariant.size : 'Unica',
                color_name: selectedVariant ? selectedVariant.color_name : '',
                color_hex: selectedVariant ? selectedVariant.color_hex : '',
                image: images[0],
                quantity: 1,
                sale_enabled: product.sale_enabled,
                original_price: product.original_price,
                wholesale_enabled: product.wholesale_enabled,
                wholesale_min_qty: product.wholesale_min_qty,
                wholesale_discount_percent: product.wholesale_discount_percent,
                bundle_2x_enabled: product.bundle_2x_enabled,
                bundle_2x_price: product.bundle_2x_price
            });
        }

        function renderReviews() {
            const score = (4 + Math.random()).toFixed(1);
            document.getElementById('review-score').textContent = score;
            document.getElementById('review-stars').innerHTML = renderStars(Math.round(score));
            document.getElementById('review-count').textContent = `${Math.floor(Math.random() * 200) + 50} calificaciones`;

            const names = ['Ana M.', 'Maria G.', 'Sofia R.', 'Diana L.', 'Carmen P.'];
            const texts = [
                'Excelente calidad, la tela es muy suave. Lo recomiendo totalmente.',
                'Me quedo perfecto, pedi talla M y es justo lo que esperaba.',
                'Llego muy rapido y en buen estado. El color es igual a la foto.',
                'Muy bonito, buen precio. Volvere a comprar.',
                'Supero mis expectativas, la tela es fresca y comoda.'
            ];
            const list = document.getElementById('reviews-list');
            list.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'review-item';
                div.innerHTML = `
                    <div class="review-item__header">
                        <div class="review-item__avatar">${names[i].charAt(0)}</div>
                        <span class="review-item__name">${names[i]}</span>
                        <div class="review-item__stars">${renderStars(5)}</div>
                    </div>
                    <p class="review-item__text">${texts[i]}</p>
                `;
                list.appendChild(div);
            }
        }

        function renderRecommended(current) {
            const container = document.getElementById('recommended-grid');
            if (!container) return;

            const others = allProducts
                .filter((p) => p.id !== current.id && p.is_active)
                .slice(0, 4);

            if (others.length === 0) {
                container.innerHTML = '<p style="color:#999; font-size:0.8rem; text-align:center;">Descubre mas en nuestro catalogo</p>';
                return;
            }

            container.innerHTML = '';
            others.forEach((product, index) => {
                container.appendChild(renderTemuCard(product, index));
            });
        }

        function renderTemuCard(product, index) {
            const card = document.createElement('div');
            card.className = 'product-temu';

            const firstImage = product?.images?.[0];
            const totalStock = Number(product?.total_stock) || 0;
            const isOutOfStock = totalStock === 0;
            const rating = getStarRating();
            const sold = getSoldCount();
            const isAd = index < 2;

            let badgeHtml = '';
            if (product?.sale_enabled) {
                badgeHtml = `<div class="product-temu__badge-img product-temu__badge-img--sale">OFERTA</div>`;
            } else if (product?.bundle_2x_enabled) {
                badgeHtml = `<div class="product-temu__badge-img product-temu__badge-img--flash">2x1</div>`;
            }

            let priceHtml = '';
            let discountHtml = '';
            if (product?.sale_enabled && product?.original_price > 0) {
                const discount = Math.round(((product.original_price - product.price) / product.original_price) * 100);
                priceHtml = `<span class="product-temu__price">${formatMoney(product.price)}</span><span class="product-temu__price-old">${formatMoney(product.original_price)}</span>`;
                discountHtml = `<span class="product-temu__price-discount">-${discount}%</span>`;
            } else if (product?.bundle_2x_enabled && product?.bundle_2x_price > 0) {
                priceHtml = `<span class="product-temu__price">2x ${formatMoney(product.bundle_2x_price)}</span>`;
            } else {
                priceHtml = `<span class="product-temu__price">${formatMoney(product.price)}</span>`;
            }

            const urgencyHtml = product?.sale_enabled
                ? `<div class="product-temu__urgency"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Ultimo dia</div>`
                : '';

            card.innerHTML = `
                <div class="product-temu__img-wrap">
                    ${badgeHtml}
                    <img src="${safeImageUrl(firstImage, PRODUCT_FALLBACK)}" alt="${safeText(product.name)}" loading="lazy" onerror="this.src='${PRODUCT_FALLBACK}'">
                    ${isAd ? '<span class="product-temu__ad-label">Anuncio</span>' : ''}
                </div>
                <div class="product-temu__info">
                    <div class="product-temu__title">${safeText(product.name)}</div>
                    <div class="product-temu__rating">
                        <div class="product-temu__stars">${renderStars(rating)}</div>
                        <div class="product-temu__sold">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fa8c16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                            ${sold} vendidos
                        </div>
                    </div>
                    <div class="product-temu__price-row">
                        ${priceHtml}
                        ${discountHtml}
                    </div>
                    ${urgencyHtml}
                    <div class="product-temu__actions">
                        <span style="font-size:0.6rem; color:#999;">${isOutOfStock ? 'Agotado' : 'En stock'}</span>
                        <button class="product-temu__cart-btn" type="button" aria-label="Agregar al carrito" ${isOutOfStock ? 'disabled style="opacity:0.4;"' : ''} onclick="event.stopPropagation(); addTemuToCart('${encodeURIComponent(product.id)}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </button>
                    </div>
                </div>
            `;

            card.addEventListener('click', (e) => {
                if (e.target.closest('.product-temu__cart-btn')) return;
                window.location.href = `/producto.html?id=${encodeURIComponent(product.id)}`;
            });

            return card;
        }

        async function addTemuToCart(encodedId) {
            const id = decodeURIComponent(encodedId);
            try {
                const product = await getProduct(id);
                if (!product) { showToast('Producto no encontrado', 'error'); return; }
                const totalStock = Number(product.total_stock) || 0;
                if (totalStock === 0) { showToast('Producto agotado', 'error'); return; }
                const firstImage = product.images?.[0] || '';
                const variant = product.variants?.[0];
                addToCart({
                    product_id: product.id,
                    sku: variant?.sku || product.id,
                    name: product.name,
                    price: product.price,
                    size: variant?.size || 'Unica',
                    color_name: variant?.color_name || '',
                    color_hex: variant?.color_hex || '',
                    image: firstImage,
                    quantity: 1,
                    sale_enabled: product.sale_enabled,
                    original_price: product.original_price,
                    wholesale_enabled: product.wholesale_enabled,
                    wholesale_min_qty: product.wholesale_min_qty,
                    wholesale_discount_percent: product.wholesale_discount_percent,
                    bundle_2x_enabled: product.bundle_2x_enabled,
                    bundle_2x_price: product.bundle_2x_price
                });
            } catch (err) {
                showToast('Error al agregar al carrito', 'error');
            }
        }

        function shareProduct() {
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('product-name')?.textContent || 'Producto Modas Nancy',
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast('Enlace copiado al portapapeles');
                }).catch(() => {
                    showToast('No se pudo compartir', 'error');
                });
            }
        }
    </script>
    <script src="/js/menu-drawer.js"></script>
</body>
</html>
