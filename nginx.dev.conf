# =============================================================
# modasnancy — nginx.dev.conf (Desarrollo local)
# Un solo servidor, sin SSL, proxy directo al backend.
# =============================================================

server {
    listen 80;
    server_name localhost;

    server_tokens off;
    client_max_body_size 50M;

    # --- Headers de seguridad básicos ------------------------
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;

    # --- Archivos estáticos ----------------------------------
    location /assets/ {
        root  /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # --- Imágenes de productos / paquetes / recibos ----------
    location /products/ {
        alias /products_data/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    location /packages/ {
        alias /packages_data/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    location /receipts/ {
        alias /receipts_data/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # --- Rutas SPA (paneles y páginas especiales) ------------
    location /admin {
        root  /usr/share/nginx/html;
        index admin.html;
        try_files $uri $uri/ /admin.html;
    }

    location /stock {
        root  /usr/share/nginx/html;
        index stock.html;
        try_files $uri $uri/ /stock.html;
    }

    location /pedidos {
        root  /usr/share/nginx/html;
        index pedidos.html;
        try_files $uri $uri/ /pedidos.html;
    }

    location /vendedor {
        root  /usr/share/nginx/html;
        index vendedor.html;
        try_files $uri $uri/ /vendedor.html;
    }

    location /live {
        root  /usr/share/nginx/html;
        index live.html;
        try_files $uri $uri/ /live.html;
    }

    location /promo {
        root  /usr/share/nginx/html;
        index promo.html;
        try_files $uri $uri/ /promo.html;
    }

    # --- API Proxy → Backend ---------------------------------
    location /api/ {
        proxy_pass         http://modasnancy-backend-dev:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Sitio principal (siempre al final) ------------------
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
