name: modasnancy-dev

services:
  frontend:
    image: nginx:alpine
    container_name: modasnancy-frontend-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./data/products:/products_data:ro
      - ./data/packages:/packages_data:ro
      - ./data/receipts:/receipts_data:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - modasnancy-net-dev
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modasnancy-backend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - modasnancy-net-dev
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: modasnancy-db-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    volumes:
      - modasnancy_db_data_dev:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - modasnancy-net-dev

networks:
  modasnancy-net-dev:
    driver: bridge

volumes:
  modasnancy_db_data_dev:
