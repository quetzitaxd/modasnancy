# =============================================================
# modasnancy — nginx.conf (Configuración Interna para NPM)
# Delegamos SSL y HSTS a Nginx Proxy Manager
# =============================================================
# INSTRUCCIONES:
# Reemplaza los server_name de cada bloque por tus dominios reales
# Ejemplo: server_name tudominio.com www.tudominio.com;
# =============================================================

# --- Rate Limiting (leaky bucket) ----------------------------
# NPM ya suele pasar el IP real en X-Real-IP o X-Forwarded-For
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/m;

# Bloque para el sitio principal
server {
    listen 80;
    server_name modasnancy.com www.modasnancy.com;

    # Ocultar versión de Nginx
    server_tokens off;
    client_max_body_size 50M;

    # --- Headers de seguridad básicos ------------------------
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # --- Limpieza de parámetros obsoletos a nivel servidor ---
    if ($request_uri ~ "^([^\?]*\?[^\?]*?)\&fbclid=[^&]*$") {
        return 301 $1;
    }
    if ($request_uri ~ "^([^\?]*)\?fbclid=[^&]*\&(.*)$") {
        return 301 $1?$2;
    }
    if ($request_uri ~ "^([^\?]*)\?fbclid=[^&]*$") {
        return 301 $1;
    }

    # --- Archivos estáticos del frontend ---------------------
    location /assets/ {
        root  /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location /promo/ {
        root  /usr/share/nginx/html;
        index promo.html;
        try_files $uri $uri/ /promo.html;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- API Proxy → Backend ---------------------------------

    # Login con límite estricto
    location ^~ /api/login {
        limit_req zone=login_limit burst=3;
        limit_req_status 429;

        proxy_pass         http://modasnancy-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # API General
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://modasnancy-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Imágenes de productos -------------------------------
    location /products/ {
        alias /products_data/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /receipts/ {
        alias /receipts_data/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}

