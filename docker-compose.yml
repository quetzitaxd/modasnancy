name: modasnancy

services:
  frontend:
    image: nginx:alpine
    container_name: modasnancy-frontend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./data/products:/products_data:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
      - modasnancy-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modasnancy-backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - proxy
      - modasnancy-net
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: modasnancy-db
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    volumes:
      - modasnancy_db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - modasnancy-net

networks:
  proxy:
    external: true
  modasnancy-net:
    driver: bridge

volumes:
  modasnancy_db_data:
